<!DOCTYPE html>
<html>
<head>
  <title>Bulk Email Sender PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    textarea, input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 15px;
      background: #00ff99;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .stats {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h2>📧 Bulk Email Sender PRO</h2>

<textarea id="emails" rows="5" placeholder="Enter emails (comma separated)"></textarea>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="title" placeholder="Email Subject">

<textarea id="message" rows="5" placeholder="Message"></textarea>

<button onclick="sendEmails()">Send Emails</button>

<div class="stats">
  ✅ Sent: <span id="sent">0</span> |
  ❌ Failed: <span id="failed">0</span>
</div>

<script>
  (function(){
    emailjs.init("c1X32LxPHheBy0KJn");
  })();

  let sentCount = 0;
  let failCount = 0;

  function sendEmails() {

    let emailList = document.getElementById("emails").value.split(",");
    let name = document.getElementById("name").value;
    let title = document.getElementById("title").value;
    let message = document.getElementById("message").value;

    sentCount = 0;
    failCount = 0;

    document.getElementById("sent").innerText = 0;
    document.getElementById("failed").innerText = 0;

    emailList.forEach(function(email, index) {

      setTimeout(function() {

        let params = {
          title: title,
          name: name,
          message: message,
          email: email.trim()
        };

        emailjs.send("service_wsg1p4u", "template_sygs8we", params)
          .then(function() {
            sentCount++;
            document.getElementById("sent").innerText = sentCount;
            console.log("✅ Sent:", email);
          })
          .catch(function(error) {
            failCount++;
            document.getElementById("failed").innerText = failCount;
            console.log("❌ Failed:", error);
          });

      }, index * 3000); // ⏱️ 3 sec delay

    });

    alert("🚀 Sending started safely...");
  }
</script>

</body>
</html>
